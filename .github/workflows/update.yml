name: Update DUNCAN Ratings

on:
  schedule:
    - cron: '13 15 * * *'   # 15:13 UTC daily — leads US-sport block; basketball-reference (sports-reference family, rate-limited)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed for git push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install cython numpy
          pip install --no-build-isolation -r requirements.txt

      - name: Run ratings engine
        run: python duncan.py

      - name: Generate web data
        run: python generate_data.py

      - name: Commit and push updated data
        run: |
          git config user.name  "DUNCAN Bot"
          git config user.email "duncan-bot@users.noreply.github.com"
          git add loaded_nba_games.csv all_nba_games.csv duncan_ratings.csv daily_standings.csv duncan_ratings_with_standings.csv docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ratings $(date -u '+%Y-%m-%d')"
            git push
          fi
